<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrendRadar 配置面板</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">awoele/TrendRadar</p>
        <h1>配置面板</h1>
      </div>
      <div class="header-links">
        <a class="report-link" href="../content/">内容</a>
        <a class="report-link" href="../stats/">统计</a>
        <a class="report-link" href="../index.html">查看热榜</a>
      </div>
    </header>

    <main class="shell">
      <section class="auth-panel" id="authPanel">
        <div>
          <p class="eyebrow">GitHub 授权</p>
          <h2>只有仓库写入权限可以保存配置</h2>
        </div>
        <label class="field">
          <span>GitHub token</span>
          <input id="tokenInput" type="password" autocomplete="off" placeholder="fine-grained token">
        </label>
        <label class="checkline">
          <input id="rememberToken" type="checkbox">
          <span>保存在这个浏览器</span>
        </label>
        <div class="action-row">
          <button id="unlockButton" type="button">解锁配置</button>
          <button id="forgetButton" class="secondary" type="button">清除</button>
        </div>
        <p class="status" id="authStatus">需要 `Contents: Read and write` 权限；建议再给 `Actions: Write`。</p>
      </section>

      <form class="workspace locked" id="configForm">
        <section class="section-head">
          <div>
            <p class="eyebrow">抓取设置</p>
            <h2>主题、平台和报告规则</h2>
          </div>
          <div class="action-row">
            <button id="reloadButton" class="secondary" type="button">重新加载</button>
            <button id="saveButton" type="submit">保存并发布</button>
          </div>
        </section>

        <section class="control-grid">
          <label class="field">
            <span>报告模式</span>
            <select id="reportMode">
              <option value="incremental">增量监控</option>
              <option value="current">当前榜单</option>
              <option value="daily">当日汇总</option>
            </select>
          </label>
          <label class="field">
            <span>排名高亮阈值</span>
            <input id="rankThreshold" type="number" min="1" max="100" step="1">
          </label>
          <label class="field">
            <span>单个主题最多显示</span>
            <input id="maxNewsPerKeyword" type="number" min="0" max="200" step="1">
          </label>
          <label class="field">
            <span>抓取间隔毫秒</span>
            <input id="requestInterval" type="number" min="50" max="10000" step="50">
          </label>
          <label class="field">
            <span>时区</span>
            <input id="timezone" type="text" spellcheck="false">
          </label>
          <label class="switch">
            <input id="sortByPositionFirst" type="checkbox">
            <span>按配置顺序优先排序</span>
          </label>
          <label class="switch">
            <input id="reverseContentOrder" type="checkbox">
            <span>新增热点新闻放在前面</span>
          </label>
        </section>

        <section class="panel-section">
          <div class="section-title">
            <div>
              <p class="eyebrow">平台</p>
              <h3>选择要抓取的平台</h3>
            </div>
            <p id="platformCount" class="count-label">0 个平台</p>
          </div>
          <div id="platformGrid" class="platform-grid"></div>
          <div class="custom-platform">
            <label class="field">
              <span>自定义平台 ID</span>
              <input id="customPlatformId" type="text" spellcheck="false" placeholder="wallstreetcn-hot">
            </label>
            <label class="field">
              <span>显示名称</span>
              <input id="customPlatformName" type="text" placeholder="华尔街见闻">
            </label>
            <button id="addPlatformButton" class="secondary" type="button">添加平台</button>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-title">
            <div>
              <p class="eyebrow">主题</p>
              <h3>编辑抓取关键词</h3>
            </div>
            <p class="count-label" id="keywordCount">0 行</p>
          </div>
          <textarea id="keywordText" spellcheck="false"></textarea>
          <div class="syntax-strip">
            <span>普通词：AI</span>
            <span>必须词：+发布会</span>
            <span>过滤词：!广告</span>
            <span>数量：@10</span>
          </div>
        </section>

        <section class="save-panel">
          <p id="saveStatus" class="status">修改后保存，会提交到 GitHub 并发布下一版页面。</p>
        </section>
      </form>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
