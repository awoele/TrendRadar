<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrendRadar 内容</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <details class="side-menu">
      <summary aria-label="打开页面菜单">
        <span class="side-menu-mark">TR</span>
      </summary>
      <div class="side-menu-panel">
        <p class="eyebrow">TrendRadar</p>
        <strong>内容池</strong>
        <nav class="nav-links" aria-label="页面导航">
          <a href="./" aria-current="page">内容</a>
          <a href="../stats/">统计</a>
          <a href="../config/">配置</a>
        </nav>
      </div>
    </details>

    <main class="shell">
      <section class="toolbar content-controls" aria-label="内容筛选">
        <section class="platform-strip compact" id="platformStrip" aria-label="平台数量"></section>
        <label class="field">
          <span>搜索标题</span>
          <input id="searchInput" type="search" placeholder="例如 Codex、vibe coding、小游戏">
        </label>
        <label class="field">
          <span>平台</span>
          <select id="platformSelect">
            <option value="">全部平台</option>
          </select>
        </label>
        <button id="clearButton" type="button">清空</button>
      </section>

      <details class="advanced-filters">
        <summary>筛选 / 排序</summary>
        <section class="toolbar topic-filters" aria-label="选题筛选">
          <label class="field">
            <span>类型</span>
            <select id="caseTypeSelect">
              <option value="">全部类型</option>
            </select>
          </label>
          <label class="field">
            <span>做了什么</span>
            <select id="builtThingSelect">
              <option value="">全部方向</option>
            </select>
          </label>
          <label class="field">
            <span>工具</span>
            <select id="toolStackSelect">
              <option value="">全部工具</option>
            </select>
          </label>
          <label class="field">
            <span>爆点</span>
            <select id="hookSelect">
              <option value="">全部爆点</option>
            </select>
          </label>
          <label class="field">
            <span>内容价值</span>
            <select id="contentValueSelect">
              <option value="">全部价值</option>
            </select>
          </label>
          <label class="field">
            <span>风险</span>
            <select id="riskFlagSelect">
              <option value="">全部风险</option>
            </select>
          </label>
          <label class="field">
            <span>排序</span>
            <select id="sortSelect">
              <option value="published_at">最新发布</option>
              <option value="hot_score">热度最高</option>
              <option value="recent_hot_score">近期热度</option>
              <option value="likes">点赞最多</option>
            </select>
          </label>
        </section>
      </details>

      <section class="content-list" id="contentList" aria-live="polite"></section>
      <p class="empty" id="emptyState" hidden>没有匹配的内容</p>

      <details class="collection-runs" aria-label="抓取记录">
        <summary class="collection-summary">
          <span>采集记录</span>
          <span class="summary-count"><strong id="visibleCount">-</strong> / <span id="totalCount">-</span></span>
          <span id="snapshotTitle">读取中</span>
        </summary>
        <div class="run-list" id="collectionRunList"></div>
      </details>
    </main>

    <script src="./app.js?v=side-menu-platform-default-1"></script>
  </body>
</html>
