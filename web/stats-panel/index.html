<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrendRadar 统计</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell stats-shell">
      <section class="stats-overview">
        <section class="status-band" id="statusBand">
          <details class="side-menu">
            <summary aria-label="打开页面菜单">
              <span class="side-menu-mark">TR</span>
            </summary>
            <div class="side-menu-panel">
              <p class="eyebrow">TrendRadar</p>
              <strong>统计</strong>
              <nav class="nav-links" aria-label="页面导航">
                <a href="../content/">内容</a>
                <a href="./" aria-current="page">统计</a>
                <a href="../config/">配置</a>
              </nav>
            </div>
          </details>
          <div>
            <p class="eyebrow">数据快照</p>
            <strong class="status-time" id="updatedAt">读取中</strong>
          </div>
          <a class="primary-link" href="../content/">查看内容</a>
        </section>

        <section class="metric-grid metric-rail" aria-label="核心统计">
          <article class="metric">
            <span>内容总数</span>
            <strong id="totalCrawled">-</strong>
          </article>
          <article class="metric">
            <span>已纳入</span>
            <strong id="totalMatched">-</strong>
          </article>
          <article class="metric">
            <span>纳入率</span>
            <strong id="matchRate">-</strong>
          </article>
          <article class="metric">
            <span>异常平台</span>
            <strong id="failedCount">-</strong>
          </article>
        </section>
      </section>

      <section class="dashboard-grid">
        <section class="panel platform-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Platforms</p>
              <h2>平台表现</h2>
            </div>
            <span class="pill" id="platformCount">0 个平台</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>平台</th>
                  <th>内容</th>
                  <th>纳入</th>
                  <th>占比</th>
                </tr>
              </thead>
              <tbody id="platformRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel health-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Health</p>
              <h2>失败平台</h2>
            </div>
          </div>
          <div class="failure-list" id="failedPlatforms"></div>
        </section>

        <section class="panel keyword-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Keywords</p>
              <h2>关键词排行</h2>
            </div>
          </div>
          <div class="rank-list" id="keywordRows"></div>
        </section>
      </section>
    </main>

    <template id="emptyTemplate">
      <p class="empty">暂无数据</p>
    </template>

    <script src="./app.js?v=stats-menu-inside-snapshot-1"></script>
  </body>
</html>
