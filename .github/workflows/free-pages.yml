name: Free Public Pages

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/free-pages.yml"
      - "config/config.yaml"
      - "config/frequency_words.txt"
      - "data/imports/**"
      - "scripts/prepare_pages_artifact.py"
      - "web/config-panel/**"
      - "web/content-panel/**"
      - "web/stats-panel/**"
  workflow_dispatch:

concurrency:
  group: free-pages-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-content:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify required files
        run: |
          test -d data/imports
          test -d web/content-panel
          test -d web/stats-panel
          test -d web/config-panel

      - name: Prepare public artifact
        run: python scripts/prepare_pages_artifact.py --source output --dest public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
